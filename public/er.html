<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Course Management System — ER Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f1a;
    --bg2: #111827;
    --bg3: #1a2035;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --teal: #14b8a6;
    --coral: #f97316;
    --pink: #ec4899;
    --green: #22c55e;
    --yellow: #eab308;
    --blue: #3b82f6;

    --t-users: #6366f1;
    --t-dept: #14b8a6;
    --t-prof: #f97316;
    --t-students: #ec4899;
    --t-courses: #3b82f6;
    --t-semesters: #eab308;
    --t-enrollments: #22c55e;
    --t-grades: #a855f7;
  }

  body {
    background: var(--bg);
    font-family: 'Sora', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 40px 60px 30px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .header-left p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
  }

  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .canvas-wrap {
    position: relative;
    z-index: 1;
    padding: 50px 40px 60px;
    overflow-x: auto;
  }

  svg#erd {
    display: block;
    margin: 0 auto;
    max-width: 100%;
    overflow: visible;
  }

  /* Table group styles */
  .tbl-group { cursor: pointer; }
  .tbl-group:hover .tbl-header { filter: brightness(1.15); }
  .tbl-group:hover .tbl-body { filter: brightness(1.06); }

  .tbl-header {
    transition: filter 0.2s;
  }
  .tbl-body {
    transition: filter 0.2s;
  }

  .tbl-row-even { fill: rgba(255,255,255,0.025); }
  .tbl-row-odd  { fill: rgba(255,255,255,0.01); }

  /* Connector lines */
  .conn-line {
    fill: none;
    stroke-width: 1.5;
    stroke-dasharray: none;
    opacity: 0.55;
    transition: opacity 0.2s;
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: var(--bg2);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    pointer-events: none;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 200px;
    line-height: 1.6;
  }

  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>// course_management_system.erd</h1>

    <div class="legend-item"><div class="legend-dot" style="background:#a855f7"></div>grades</div>

</header>

  <marker id="arrow-green"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#eab308" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L9 5L1 9" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  <filter id="glow-teal"><feGaussianBlur stdDeviation="3" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>

  <!-- Subtle glow for active connections -->
  <filter id="glow">
    <feGaussianBlur stdDeviation="2.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<div id="tooltip"></div>

<script>
  const tooltip = document.getElementById('tooltip');

  const tableInfo = {
    users: 'Auth table — stores login credentials. Not directly linked to other tables.',
    departments: 'Central table — linked to professors, students, and courses.',
    professors: 'Staff table — each professor belongs to a department.',
    students: 'People table — each student belongs to a department.',
    courses: 'Academic table — linked to department and professor.',
    semesters: 'Time table — defines academic periods.',
    enrollments: 'Junction table — connects students, courses, and semesters.',
    grades: 'Results table — one grade per enrollment (1:1).',
  };

  document.querySelectorAll('.tbl-group').forEach(g => {
    g.addEventListener('mouseenter', e => {
      const name = g.dataset.table;
      tooltip.innerHTML = `<strong style="color:var(--text)">${name}</strong><br>${tableInfo[name] || ''}`;
      tooltip.style.opacity = '1';
    });
    g.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top  = (e.clientY - 10) + 'px';
    });
    g.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
    });
  });

  document.querySelectorAll('.conn-line').forEach(line => {
    line.addEventListener('mouseenter', e => {
      const rel = line.dataset.rel;
      tooltip.innerHTML = `<strong style="color:var(--text)">${rel}</strong><br>one-to-many relationship`;
      tooltip.style.opacity = '1';
      line.style.opacity = '1';
      line.style.strokeWidth = '2.5';
    });
    line.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top  = (e.clientY - 10) + 'px';
    });
    line.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
      line.style.opacity = '0.55';
      line.style.strokeWidth = '1.5';
    });
  });
</script>
